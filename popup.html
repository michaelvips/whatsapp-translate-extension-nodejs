<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WhatsApp Web Translator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>WhatsApp Web Translator</h1>

      <label for="provider">Tradutor</label>
      <select id="provider">
        <option value="openai">OpenAI</option>
        <option value="google">Google Cloud Translation</option>
      </select>

      <div id="openai-settings">
        <label for="openai-api-key">Chave OpenAI</label>
        <input id="openai-api-key" type="password" autocomplete="off" placeholder="sk-..." />

        <label for="openai-model">Modelo OpenAI</label>
        <input id="openai-model" type="text" autocomplete="off" placeholder="gpt-4.1-mini" />
      </div>

      <div id="google-settings" hidden>
        <label for="google-api-key">Chave Google API</label>
        <input id="google-api-key" type="password" autocomplete="off" placeholder="AIza..." />
      </div>

      <label for="your-language">Seu Idioma</label>
      <select id="your-language"></select>

      <label for="contact-language">Idioma do Contato</label>
      <select id="contact-language"></select>

      <div class="setting-row">
        <span id="translation-enabled-label">Ativar Tradução</span>
        <label class="switch" aria-labelledby="translation-enabled-label">
          <input id="translation-enabled" type="checkbox" checked />
          <span class="slider"></span>
        </label>
      </div>

      <div class="usage-card">
        <strong>Como usar</strong>
        <p>Atalho: <kbd>Alt</kbd> + <kbd>T</kbd></p>
        <p>Revise a tradução antes de enviar.</p>
      </div>

      <button id="save" type="button">Salvar</button>
      <p id="status" aria-live="polite"></p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
